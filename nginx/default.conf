# Опциональный nginx reverse proxy для production-развёртывания.
# Чтобы включить: добавьте сервис nginx в docker-compose.yml, монтировав этот файл
# в /etc/nginx/conf.d/default.conf, и пробросьте 80/443 порты.

upstream pis_backend  { server backend:8000; }
upstream pis_frontend { server frontend:3000; }

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    # ---- Backend API ----
    location /api/ {
        proxy_pass http://pis_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- OpenAPI docs ----
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://pis_backend;
        proxy_set_header Host $host;
    }

    # ---- Next.js frontend ----
    location / {
        proxy_pass http://pis_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
