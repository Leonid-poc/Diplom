# Nginx reverse proxy для ПИС «Маршрут».
# Все запросы идут через один порт 80 — фронт и backend на одном origin,
# поэтому CORS-проблемы отсутствуют, а NEXT_PUBLIC_API_URL=/api/v1.

upstream pis_backend  { server backend:8000; }
upstream pis_frontend { server frontend:3000; }

# Поддержка WebSocket (Next.js HMR в dev-режиме)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 50m;

    # Тайм-ауты увеличены под тяжёлые операции (расчёт маршрутов, кластеризация)
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ---- Backend API ----
    location /api/ {
        proxy_pass http://pis_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- OpenAPI docs / Swagger / ReDoc ----
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://pis_backend;
        proxy_set_header Host $host;
    }

    # ---- Next.js HMR WebSocket (только dev) ----
    location /_next/webpack-hmr {
        proxy_pass http://pis_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
    }

    # ---- Next.js frontend (остальное) ----
    location / {
        proxy_pass http://pis_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
